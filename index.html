<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta property="og:title" content="ht-security | מסוף תקשורת טקטי">
<meta property="og:description" content="מערכת קשר קולי והעברת נתונים מאובטחת מקצה לקצה (Zero-Trust) עם אימות כפול.">
<meta property="og:image" content="https://img.icons8.com/nolan/512/security-shield.png">
<meta property="og:type" content="website">
<title>ht-security — Tactical Secure Terminal</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --void:#030712; --deep:#060d1a; --panel:#0a1428; --card:#0d1b35;
  --line:#1a2d4a; --line2:rgba(0,212,255,0.12);
  --cyan:#00d4ff; --cyan2:rgba(0,212,255,0.6); --cyan3:rgba(0,212,255,0.15);
  --green:#00ff9d; --red:#ff3366; --t1:#dbeafe; --t3:#3d6080;
  --mono:'JetBrains Mono',monospace; --ui:'Heebo',sans-serif;
  --r:6px; --tr:0.2s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--void);color:var(--t1);font-family:var(--ui);font-size:14px;overflow-x:hidden;min-height:100vh;margin:0;}
.grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);background-size:50px 50px;animation:grid-drift 60s linear infinite;}
@keyframes grid-drift{to{background-position:50px 50px}}
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;max-width:1200px;margin:0 auto;padding:0 12px 16px;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px;border-bottom:1px solid var(--line2);gap:10px;flex-wrap:wrap;flex-shrink:0;}
.logo-block{display:flex;align-items:center;gap:10px}
.logo-hex{position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-hex svg{position:absolute;animation:hex-rot 18s linear infinite}
@keyframes hex-rot{to{transform:rotate(360deg)}}
.logo-inner{font-family:var(--mono);font-size:0.8rem;font-weight:700;color:var(--cyan);letter-spacing:0.06em;text-shadow:0 0 16px var(--cyan)}
.logo-name{font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--cyan);text-shadow:0 0 20px rgba(0,212,255,0.5);letter-spacing:0.1em;text-transform:lowercase;}
.conn-pill{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--panel);border:1px solid var(--line2);border-radius:100px;font-size:0.72rem;}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--red);box-shadow:0 0 6px var(--red);transition:all var(--tr);}
.conn-dot.secure{background:var(--green);box-shadow:0 0 10px var(--green);}
.room-bar{padding:14px 0 12px;border-bottom:1px solid var(--line2);display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.room-input{flex:1;min-width:120px;padding:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);color:var(--cyan);font-family:var(--mono);outline:none;}
.btn{font-family:var(--ui);font-weight:700;border:none;border-radius:var(--r);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;padding:10px 16px;background:transparent;border:1.5px solid var(--cyan);color:var(--cyan);}
.btn-voice{display:none;}
.main-layout{flex:1;display:grid;grid-template-columns:1fr 350px;gap:10px;padding:10px 0;min-height:0;}
.panel{background:var(--panel);border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;position:relative;}
.lock-overlay{position:absolute;inset:0;background:rgba(3,7,18,0.95);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;text-align:center;padding:20px;}
.lock-overlay.hidden{display:none}
.log-body{flex:1;overflow-y:auto;padding:10px;font-family:var(--mono);font-size:0.65rem;direction:ltr;text-align:left;}
.hidden{display:none !important}
@media(max-width:768px){ .main-layout{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="grid-bg"></div>
<audio id="remote-audio" autoplay></audio>
<div class="app">
  <header>
    <div class="logo-block">
      <div class="logo-hex"><svg width="40" height="40"><polygon points="20,3 35,11.5 35,28.5 20,37 5,28.5 5,11.5" stroke="var(--cyan3)" fill="none"/></svg><div class="logo-inner">SEC</div></div>
      <div style="display:flex; flex-direction:column">
        <div class="logo-name">ht-security</div>
        <div style="font-size:0.55rem;color:var(--t3);letter-spacing:0.15em;">Double-Layer Encrypted Terminal</div>
      </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button id="btn-voice" class="btn btn-voice" onclick="ZDT.toggleVoice()">📞 קשר קולי</button>
      <div class="conn-pill"><div id="conn-dot" class="conn-dot"></div><span>סטטוס: <span id="conn-state">מנותק</span></span></div>
    </div>
  </header>
  
  <div class="room-bar">
    <input id="room-input" class="room-input" type="text" placeholder="מזהה חדר..." style="text-transform:uppercase;">
    <input id="sec-input" class="room-input" type="password" placeholder="מפתח הצפנה (חובה)...">
    <button class="btn" id="btn-connect" onclick="UI.handleConnect()">הקם מנהרה</button>
  </div>

  <div class="main-layout">
    <div class="panel">
      <div class="lock-overlay" id="lock-overlay">
        <div style="font-size:2.5rem">🛡️</div>
        <div style="font-family:var(--mono); color:var(--red);">SYSTEM LOCKED</div>
        <div style="font-size:0.8rem; color:var(--t3);">הזן מזהה חדר ומפתח הצפנה כדי לפתוח את המסוף.</div>
      </div>
      <div style="padding:15px; flex:1; display:flex; flex-direction:column; gap:10px;">
        <div id="chat-msgs" style="flex:1; overflow-y:auto; padding:10px; border-bottom:1px solid var(--line2);"></div>
        <div style="display:flex; gap:5px;">
          <input id="chat-input" class="room-input" placeholder="הודעה מוצפנת..." onkeydown="if(event.key==='Enter') ZDT.triggerChat()">
          <button class="btn" onclick="ZDT.triggerChat()">➤</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div style="padding:10px; font-size:0.7rem; border-bottom:1px solid var(--line2); color:var(--cyan);">SECURITY TELEMETRY</div>
      <div id="log-body" class="log-body"></div>
    </div>
  </div>
</div>

<script>
const SIGNAL_URL = 'https://zdt-signaling.onrender.com';
const ICE_SERVERS = { iceServers:[{urls:'stun:stun.l.google.com:19302'}] };

const LOG = { 
  add(lv, msg, isErr=false) { 
    const b = document.getElementById('log-body'); 
    const d = document.createElement('div'); 
    d.innerHTML = `[${new Date().toTimeString().slice(0,8)}] <span style="color:${isErr?'var(--red)':'var(--cyan)'}">${lv}</span> ${msg}`; 
    b.appendChild(d); b.scrollTop = b.scrollHeight; 
  } 
};

// מודול ההצפנה המקומית (AES-256-GCM)
const CRYPTO = {
  key: null,
  async deriveKey(password) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
    this.key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: enc.encode("ht-security-core"), iterations: 100000, hash: "SHA-256" },
      baseKey, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
    );
    LOG.add('CRYPTO', 'LOCAL KEY DERIVED (AES-256)');
  },
  async encryptTxt(text) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, this.key, new TextEncoder().encode(text));
    return JSON.stringify({ iv: btoa(String.fromCharCode(...iv)), ct: btoa(String.fromCharCode(...new Uint8Array(ct))) });
  },
  async decryptTxt(payload) {
    try {
      const data = JSON.parse(payload);
      const iv = new Uint8Array(atob(data.iv).split('').map(c => c.charCodeAt(0)));
      const ct = new Uint8Array(atob(data.ct).split('').map(c => c.charCodeAt(0)));
      const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, this.key, ct);
      return new TextDecoder().decode(dec);
    } catch (e) {
      LOG.add('SEC-ALERT', 'DECRYPTION FAILED - INVALID KEY', true);
      return "[הודעה חסומה: מפתח שגוי]";
    }
  }
};

const UI = {
  async handleConnect() { 
    const r = document.getElementById('room-input').value.toUpperCase(); 
    const p = document.getElementById('sec-input').value;
    if(!r || !p) { alert("חובה להזין מזהה חדר ומפתח הצפנה"); return; }
    
    document.getElementById('btn-connect').disabled = true;
    document.getElementById('btn-connect').textContent = 'INITIALIZING...';
    
    await CRYPTO.deriveKey(p);
    ZDT.connect(r); 
  },
  appendMsg(m, s) {
    const d = document.createElement('div'); d.style.textAlign = s==='me' ? 'right' : 'left';
    d.innerHTML = `<span style="background:var(--card); padding:8px 12px; border-radius:8px; display:inline-block; margin:4px; font-size:0.9rem; border:1px solid ${s==='me'?'var(--line)':'var(--cyan3)'}">${m}</span>`;
    document.getElementById('chat-msgs').appendChild(d); document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
  }
};

const ZDT = {
  socket: null, pc: null, dc: null, localStream: null, voiceActive: false,
  connect(room) {
    this.socket = io(SIGNAL_URL, {transports:['websocket']});
    this.socket.on('connect', () => { LOG.add('SYS', 'UPLINK OK'); this.socket.emit('join', room); });
    this.socket.on('joined', () => { document.getElementById('conn-state').textContent = 'ממתין לעמית...'; });
    this.socket.on('ready', async () => { await this._setup(true, room); });
    this.socket.on('message', async (m) => {
      if(!this.pc) await this._setup(false, room);
      try {
        if(m.type==='offer') { await this.pc.setRemoteDescription(m); const a = await this.pc.createAnswer(); await this.pc.setLocalDescription(a); this.socket.emit('message', room, a); }
        else if(m.type==='answer') await this.pc.setRemoteDescription(m);
        else if(m.candidate) await this.pc.addIceCandidate(m);
      } catch(e) {}
    });
  },
  async _setup(init, room) {
    this.pc = new RTCPeerConnection(ICE_SERVERS);
    this.pc.onicecandidate = e => e.candidate && this.socket.emit('message', room, e.candidate);
    this.pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
    if(init) {
      this.dc = this.pc.createDataChannel('ht_sec_data'); this._bindDC();
      const o = await this.pc.createOffer(); await this.pc.setLocalDescription(o);
      this.socket.emit('message', room, o);
    } else { this.pc.ondatachannel = e => { this.dc = e.channel; this._bindDC(); }; }
  },
  _bindDC() {
    this.dc.onopen = () => { 
      LOG.add('SEC', 'TUNNEL LOCKED'); 
      document.getElementById('lock-overlay').classList.add('hidden');
      document.getElementById('conn-dot').classList.add('secure');
      document.getElementById('conn-state').textContent = 'מאובטח';
      document.getElementById('btn-voice').style.display = 'block';
    };
    this.dc.onmessage = async e => { 
      // פענוח כפול של ההודעה הנכנסת
      const decryptedMsg = await CRYPTO.decryptTxt(e.data);
      UI.appendMsg(decryptedMsg, 'them'); 
    };
  },
  async toggleVoice() {
    if(!this.voiceActive) {
      try {
        this.localStream = await navigator.mediaDevices.getUserMedia({audio: true});
        this.localStream.getTracks().forEach(t => this.pc.addTrack(t, this.localStream));
        const room = document.getElementById('room-input').value.toUpperCase();
        const o = await this.pc.createOffer(); await this.pc.setLocalDescription(o);
        this.socket.emit('message', room, o);
        document.getElementById('btn-voice').style.color = 'var(--red)';
        document.getElementById('btn-voice').style.borderColor = 'var(--red)';
        document.getElementById('btn-voice').textContent = '🔴 נתק קשר';
        this.voiceActive = true; LOG.add('VOICE', 'MIC ACTIVE');
      } catch(e) { LOG.add('ERR', 'MIC DENIED', true); }
    } else { location.reload(); }
  },
  async triggerChat() {
    const i = document.getElementById('chat-input'); if(!i.value || !this.dc) return;
    const rawMsg = i.value;
    i.value = '';
    // הצפנה כפולה לפני שליחה
    const encryptedPayload = await CRYPTO.encryptTxt(rawMsg);
    this.dc.send(encryptedPayload);
    UI.appendMsg(rawMsg, 'me'); 
  }
};
</script>
</body>
</html>
