<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
    <title>ht-security | Secure Terminal</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --void:#000000; --cyan:#00d4ff; --panel:#0a1428; --green:#00ff9d; --red:#ff3366; }
        body { background:var(--void); color:var(--cyan); font-family: monospace; margin:0; padding:15px; font-size: 16px; }
        input, button { background:var(--panel); border:1px solid var(--cyan); color:var(--cyan); padding:10px; font-family:monospace; font-size: 16px; outline: none; margin-bottom: 10px; }
        button { cursor:pointer; font-weight:bold; }
        button:hover { background:var(--cyan); color:var(--void); }
        .header { border-bottom: 1px solid var(--cyan); padding-bottom: 10px; margin-bottom: 15px; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        /* חלון הצ'אט המוגדל לפי בקשתך */
        #chat-box { height: 50vh; min-height: 350px; border: 1px solid rgba(0,212,255,0.4); background: rgba(0,0,0,0.5); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        
        .msg { padding: 10px; border-radius: 4px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-end; border: 1px solid var(--cyan); color: var(--cyan); }
        .msg.them { align-self: flex-start; border: 1px solid var(--green); color: var(--green); }
        
        #msg-input { flex: 1; margin-bottom: 0; }
        .log { height: 120px; overflow-y: auto; background: #050505; color: var(--green); padding: 10px; font-size: 0.8rem; border: 1px solid #333; direction: ltr; text-align: left; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🛡️ ht-security | Terminal</h2>
        <div class="flex-row">
            <span>סטטוס:</span>
            <strong id="status" style="color:var(--red);">[ מנותק ]</strong>
        </div>
    </div>

    <div class="flex-row">
        <input id="room-id" type="text" placeholder="מזהה חדר..." style="text-transform:uppercase; width: 120px;">
        <input id="sec-key" type="password" placeholder="מפתח הצפנה (חובה)..." style="width: 180px; border-color:var(--red);">
        <button id="connect-btn" onclick="UI.init()">הקם מנהרה</button>
        <button id="voice-btn" style="display:none; border-color:var(--green); color:var(--green);" onclick="ZDT.toggleVoice()">🎤 פתח מיקרופון</button>
    </div>

    <div id="chat-box"></div>

    <div class="flex-row" style="margin-bottom: 15px;">
        <input id="msg-input" type="text" placeholder="הקלד הודעה מוצפנת..." onkeydown="if(event.key==='Enter') UI.sendMsg()">
        <button onclick="UI.sendMsg()" style="margin-bottom: 0;">שדר</button>
    </div>

    <div class="log" id="log-box"></div>
    <audio id="remote-audio" autoplay></audio>

    <script>
        const SIGNAL_URL = 'https://zdt-signaling.onrender.com';
        const ICE = { iceServers:[{urls:'stun:stun.l.google.com:19302'}] };

        const LOG = {
            add(tag, msg, isErr=false) {
                const b = document.getElementById('log-box');
                const d = document.createElement('div');
                d.innerHTML = `[${new Date().toTimeString().slice(0,8)}] <span style="color:${isErr?'var(--red)':'var(--cyan)'}">${tag}</span> ${msg}`;
                b.appendChild(d); b.scrollTop = b.scrollHeight;
            }
        };

        // מודול האימות הנוסף וההצפנה (AES-256)
        const CRYPTO = {
            key: null,
            async derive(pass) {
                const enc = new TextEncoder();
                const base = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
                this.key = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: enc.encode("ht-sec-salt"), iterations: 100000, hash: "SHA-256" },
                    base, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
                );
                LOG.add('SYS', 'LOCAL AUTHENTICATION KEY SET');
            },
            async encrypt(txt) {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, this.key, new TextEncoder().encode(txt));
                return JSON.stringify({ iv: btoa(String.fromCharCode(...iv)), ct: btoa(String.fromCharCode(...new Uint8Array(ct))) });
            },
            async decrypt(payload) {
                try {
                    const data = JSON.parse(payload);
                    const iv = new Uint8Array(atob(data.iv).split('').map(c=>c.charCodeAt(0)));
                    const ct = new Uint8Array(atob(data.ct).split('').map(c=>c.charCodeAt(0)));
                    const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, this.key, ct);
                    return new TextDecoder().decode(dec);
                } catch(e) {
                    LOG.add('SEC', 'AUTH FAILED - WRONG KEY', true);
                    return "[ נחסם: אימות מפתח נכשל ]";
                }
            }
        };

        const UI = {
            async init() {
                const r = document.getElementById('room-id').value.toUpperCase();
                const p = document.getElementById('sec-key').value;
                if(!r || !p) return alert("שגיאה: חובה להזין מזהה חדר ומפתח הצפנה לאימות.");
                
                document.getElementById('connect-btn').disabled = true;
                document.getElementById('connect-btn').innerText = 'מתחבר...';
                
                // הפעלת האימות המקומי
                await CRYPTO.derive(p);
                ZDT.connect(r);
            },
            async sendMsg() {
                const inp = document.getElementById('msg-input');
                if(!inp.value || !ZDT.dc) return;
                const txt = inp.value; inp.value = '';
                const enc = await CRYPTO.encrypt(txt);
                ZDT.dc.send(enc);
                this.append(txt, 'me');
            },
            append(txt, sender) {
                const box = document.getElementById('chat-box');
                const d = document.createElement('div');
                d.className = `msg ${sender}`;
                d.innerText = txt;
                box.appendChild(d); box.scrollTop = box.scrollHeight;
            }
        };

        const ZDT = {
            socket: null, pc: null, dc: null, stream: null, active: false,
            connect(room) {
                this.socket = io(SIGNAL_URL, {transports:['websocket']});
                this.socket.on('connect', () => { this.socket.emit('join', room); });
                this.socket.on('joined', () => { document.getElementById('status').innerText = '[ ממתין לעמית ]'; document.getElementById('status').style.color = 'var(--cyan)'; });
                this.socket.on('ready', async () => { await this.setup(true, room); });
                this.socket.on('message', async (m) => {
                    if(!this.pc) await this.setup(false, room);
                    if(m.type==='offer') { await this.pc.setRemoteDescription(m); const a = await this.pc.createAnswer(); await this.pc.setLocalDescription(a); this.socket.emit('message', room, a); }
                    else if(m.type==='answer') await this.pc.setRemoteDescription(m);
                    else if(m.candidate) await this.pc.addIceCandidate(m);
                });
            },
            async setup(isInit, room) {
                this.pc = new RTCPeerConnection(ICE);
                this.pc.onicecandidate = e => e.candidate && this.socket.emit('message', room, e.candidate);
                this.pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
                if(isInit) {
                    this.dc = this.pc.createDataChannel('data'); this.bindDC();
                    const o = await this.pc.createOffer(); await this.pc.setLocalDescription(o);
                    this.socket.emit('message', room, o);
                } else { this.pc.ondatachannel = e => { this.dc = e.channel; this.bindDC(); }; }
            },
            bindDC() {
                this.dc.onopen = () => { 
                    LOG.add('SEC', 'TUNNEL SECURED & AUTHENTICATED');
                    document.getElementById('status').innerText = '[ מאובטח ]'; 
                    document.getElementById('status').style.color = 'var(--green)';
                    document.getElementById('voice-btn').style.display = 'inline-block';
                    document.getElementById('connect-btn').style.display = 'none';
                    document.getElementById('sec-key').disabled = true;
                };
                this.dc.onmessage = async e => {
                    // פענוח הצפנה - אם המפתח שגוי, ההודעה תיחסם
                    const txt = await CRYPTO.decrypt(e.data);
                    UI.append(txt, 'them');
                };
            },
            async toggleVoice() {
                if(!this.active) {
                    try {
                        this.stream = await navigator.mediaDevices.getUserMedia({audio:true});
                        this.stream.getTracks().forEach(t => this.pc.addTrack(t, this.stream));
                        const room = document.getElementById('room-id').value.toUpperCase();
                        const o = await this.pc.createOffer(); await this.pc.setLocalDescription(o);
                        this.socket.emit('message', room, o);
                        const btn = document.getElementById('voice-btn');
                        btn.innerText = '🔴 נתק מיקרופון'; btn.style.color = 'var(--red)'; btn.style.borderColor = 'var(--red)';
                        this.active = true; LOG.add('VOICE', 'MIC ON');
                    } catch(e) { LOG.add('ERR', 'MIC DENIED', true); }
                } else { location.reload(); }
            }
        };
    </script>
</body>
</html>
